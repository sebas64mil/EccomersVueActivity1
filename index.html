<!DOCTYPE html>
<html lang="es">
<head>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi App Vue</title>

    <!-- CSS -->
    <link rel="stylesheet" href="./Css/Style.css">
    <link rel="stylesheet" href="./Css/IconColor.css">
    <link rel="stylesheet" href="./Css/Theme.css">
    <link rel="stylesheet" href="./Css/Button.css">
    <link rel="stylesheet" href="./Css/Input.css">
    <link rel="stylesheet" href="./Css/NavBar.css">
    <link rel="stylesheet" href="./Css/CategoriesBar.css">
    <link rel="stylesheet" href="./Css/advise.css">
    <link rel="stylesheet" href="./Css/ProductCard.css">
    <link rel="stylesheet" href="./Css/Alert.css">
    <link rel="stylesheet" href="./Css/SeccionProducts.css">
    <link rel="stylesheet" href="./Css/Check.css">
    <link rel="stylesheet" href="./Css/ProductHorizontal.css">
    <link rel="stylesheet" href="./Css/Popup.css">


    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&display=swap" rel="stylesheet">

</head>

<body>

    <div id="app">
<nav-bar 
  :isDark="isDark"
  :likesCount="likedProducts.length"
  :cartCount="cartProducts.length"
  @toggle-theme="toggleTheme"
  @search="handleSearch"
  @open-likes-popup="handleOpenLikesPopup"
  @open-cart-popup="handleOpenCartPopup"
></nav-bar>


<div class="categories-bar">
  <div class="category-wrapper">
    <button-category
      label="GENERAL"
      :selected="selectedCategory === 'GENERAL'"
      @select="handleCategorySelect('GENERAL')"
    />
  </div>
  <div class="category-wrapper" v-for="cat in ['3D','2D','Audio','Tools','VFX','AI']" :key="cat">
    <button-category
      :label="cat"
      :selected="selectedCategory === cat"
      @select="handleCategorySelect(cat)"
    />
  </div>
</div>


<div class="advise-container">
  <advise-section
    subtitle="50% off 250+ top assets"
    title="Fresh Assets Sale - Winter 2026"
    description="Discover the newest, top-performing assets on the Asset Store - from tools and VFX to environments, characters, and frameworks."
    image="./Images/Frame 5.png"
  />
</div>

<div class="main-content">
  <!-- Productos -->
  <section class="products-section">
    <h2 class="title-Products">
  PRODUCTS ({{ totalProductsDisplayed }})
</h2>

    <!-- ALERTS DE TAGS según categorías seleccionadas -->
<div class="filters-tags" v-show="selectedCategories.length > 0">
  <alert-cus 
    v-for="cat in selectedCategories" 
    :key="cat"
    :message="cat"
    type="secondary"
    @remove="handleAlertRemove($event)"
  />
</div>

    <div class="products-container">
  <product-card 
    v-for="product in filteredProducts" 
    :key="product.id"
    :product="product"
    @add-like="handleAddLike"
    @remove-like="handleRemoveLike"
    @add-cart="handleAddCart"
    @remove-cart="handleRemoveCart"
  />
    </div>
  </section>

  <!-- Sección de filtros (sidebar) -->
  <aside class="sidebar-filters">
    <!-- Categorías -->
    <h3 class="sidebar-title">ALL CATEGORIES</h3>

<div class="filters-container">
  <filter-check 
    v-for="cat in ['3D','2D','Audio','Tools','VFX','AI']" 
    :key="cat" 
    :label="cat"
    :checked="selectedCategories.includes(cat)"
    :count="products.filter(p => p.categorias.includes(cat)).length"
    @update="handleCheckUpdate"
  />
</div>

    <hr class="sidebar-divider" />

    <!-- Pricing -->
    <div class="pricing-container">
      <!-- Aquí irán tus filtros de pricing después -->
    </div>
  </aside>
</div>

<app-footer></app-footer>

  <popup
    :visible="showLikesPopup"
    :products="likedProducts"
    title="Your Likes"
    @close="showLikesPopup = false"
    @remove-like="handleRemoveLike"
    @remove-cart="handleRemoveCart"
    @add-like="handleAddLike"
    @add-cart="handleAddCart"
  ></popup>

  <popup
    :visible="showCartPopup"
    :products="cartProducts"
    title="Your Cart"
    @close="showCartPopup = false"
    @remove-like="handleRemoveLike"
    @remove-cart="handleRemoveCart"
    @add-like="handleAddLike"
    @add-cart="handleAddCart"
  ></popup>



    </div>
    

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

    <script src="./JS/Icons/IconCart.js"></script>
    <script src="./JS/Icons/IconUser.js"></script>
    <script src="./JS/Icons/IconHeart.js"></script>
    <script src="./JS/Icons/IconLets.js"></script>
    <script src="./JS/Icons/IconCheck.js"></script>
    <script src="./JS/Icons/IconTheme.js"></script>
    <script src="./JS/Icons/IconCross.js"></script>


    <script src="./JS/Components/NavBar.js"></script>
    <script src="./JS/Components/ButtonCus.js"></script>
    <script src="./JS/Components/ButtonCategory.js"></script>
    <script src="./JS/Components/InputCus.js"></script>
    <script src="./JS/Components/Advise.js"></script>
    <script src="./JS/Components/ProductCard.js"></script>
    <script src="./JS/Components/AlertCus.js"></script>
    <script src="./JS/Components/FilterCheck.js"></script>
    <script src="./JS/Components/ProductCardHorizontal.js"></script>
    <script src="./JS/Components/Popup.js"></script>
    <script src="./JS/Components/Footer.js"></script>

    <script src="./JS/data.js"></script>
    <script src="./JS/app.js"></script>



</body>
</html>
